# Daily sync: expand gf_design_preferences into the flat contact
# properties the personalized trial emails use (gf_design_pref_count,
# _1.._3_{name,url,img}). Must run at least once between a contact's
# trial signup and their Day 3 send — daily gives ~3 chances.
#
# Requires the HUBSPOT_API_KEY repository secret (Settings → Secrets and
# variables → Actions): the same portal-owned Private App token the
# email tooling uses. Private App tokens belong to the HubSpot portal,
# not a person, so this keeps running through team changes.
#
# NOTE: scheduled workflows only run from the repo's DEFAULT branch —
# this activates once merged to main.
name: sync-design-prefs

on:
  schedule:
    - cron: "17 6 * * *"   # daily 06:17 UTC (odd minute avoids GitHub's on-the-hour congestion)
  workflow_dispatch: {}

permissions:
  contents: write   # to commit design_catalog.json when new slugs appear
  issues: write     # to open a loud failure issue

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests python-dotenv

      - name: Sync design preferences to derived properties
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python scripts/sync_design_prefs.py

      - name: Commit catalog additions (new slugs fetched from the shop)
        run: |
          if ! git diff --quiet -- emails/2026-07-premium-trial-your-designs/design_catalog.json; then
            git config user.name "email-mark sync bot"
            git config user.email "actions@github.com"
            git add emails/2026-07-premium-trial-your-designs/design_catalog.json
            git commit -m "design_catalog: add slugs discovered during sync"
            git push
          else
            echo "catalog unchanged"
          fi

      - name: Open an issue on failure (loud, survives personnel changes)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "sync-design-prefs failing in:title" --json number --jq '.[0].number // empty')
          if [ -z "$existing" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "sync-design-prefs failing" \
              --body "The daily design-preference sync failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID

          Impact while broken: contacts who signed up after the last successful run won't have gf_design_pref_* properties, so the trial workflow's count branch sends them the generic Day 3 Catalog email instead of the personalized one. No broken emails go out.

          Common causes: HUBSPOT_API_KEY secret missing/revoked, HubSpot API outage, or a schema change to gf_design_preferences."
          else
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Still failing: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
